<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hedef Takip - Binance TR</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="manifest" href="manifest.json">
  <style>
    :root {
      --bg: #0f172a;
      --panel: #111827;
      --panel-2: #1f2937;
      --text: #e5e7eb;
      --muted: #94a3b8;
      --border: #334155;
      --green: #16a34a;
      --red: #dc2626;
      --yellow: #f59e0b;
      --blue: #2563eb;
      --purple: #7c3aed;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(180deg, #0b1220 0%, #111827 100%);
      color: var(--text);
    }

    .wrap {
      max-width: 1500px;
      margin: 0 auto;
      padding: 16px;
    }

    .card {
      background: rgba(17, 24, 39, 0.95);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,.25);
      margin-bottom: 16px;
    }

    h2 {
      margin: 0 0 8px;
      font-size: 20px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(7, minmax(0, 1fr));
      gap: 10px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
      position: relative;
    }

    .field label,
    .search-box label {
      font-size: 13px;
      color: var(--muted);
    }

    .field input,
    .field select,
    .search-box input,
    .search-box select {
      width: 100%;
      min-height: 42px;
      padding: 10px 12px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--panel-2);
      color: var(--text);
      outline: none;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 14px;
    }

    button {
      border: 0;
      border-radius: 10px;
      padding: 11px 14px;
      font-weight: 700;
      cursor: pointer;
      color: white;
    }

    .btn-primary { background: var(--blue); }
    .btn-secondary { background: #475569; }
    .btn-danger { background: var(--red); }
    .btn-success { background: var(--green); }
    .btn-warning { background: var(--yellow); color: #111827; }
    .btn-purple { background: var(--purple); }

    .search-row {
      margin-top: 14px;
      display: flex;
      gap: 10px;
      align-items: end;
      flex-wrap: wrap;
    }

    .search-box {
      flex: 1 1 320px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .stats {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      font-size: 14px;
      color: var(--muted);
    }

    .pill {
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(51,65,85,.55);
      border: 1px solid var(--border);
    }

    .tables-row {
      display: flex;
      gap: 16px;
      align-items: flex-start;
    }

    .tables-row .card {
      flex: 1;
      min-width: 0;
      margin-bottom: 0;
    }

    .table-wrap {
      overflow-x: auto;
      margin-top: 16px;
      border-radius: 16px;
      border: 1px solid var(--border);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 720px;
      background: rgba(15, 23, 42, 0.9);
    }

    th, td {
      padding: 12px 10px;
      border-bottom: 1px solid var(--border);
      text-align: left;
      font-size: 14px;
      vertical-align: middle;
    }

    th {
      background: #0f172a;
      position: sticky;
      top: 0;
      z-index: 1;
      color: #cbd5e1;
    }

    tr:hover td { background: rgba(30, 41, 59, .45); }

    .muted { color: var(--muted); }
    .small { font-size: 12px; }

    .cell-actions {
      display: flex;
      flex-direction: column;
      gap: 6px;
      align-items: stretch;
    }

    .cell-actions button {
      padding: 8px 10px;
      font-size: 12px;
      width: 100%;
    }

    .action-row td {
      padding-top: 0;
      border-top: 0;
    }

    .action-cell {
      padding: 8px 10px 14px;
    }

    .action-bar {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .action-bar button {
      padding: 8px 12px;
      font-size: 12px;
      width: auto;
    }

    .section-head {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }

    .badge {
      display: inline-block;
      padding: 6px 10px;
      border-radius: 999px;
      color: white;
      font-size: 12px;
      font-weight: 700;
      white-space: nowrap;
    }

    .badge-green { background: var(--green); }
    .badge-red { background: var(--red); }

    .target-pill {
      display: inline-block;
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
      white-space: nowrap;
    }

    .target-pill-down {
      background: rgba(220, 38, 38, 0.2);
      color: #f87171;
      border: 1px solid rgba(220, 38, 38, 0.35);
    }

    .target-pill-up {
      background: rgba(22, 163, 74, 0.2);
      color: #4ade80;
      border: 1px solid rgba(22, 163, 74, 0.35);
    }

    .editing {
      box-shadow: 0 0 0 2px rgba(37, 99, 235, 0.45);
    }

    .suggestions {
      display: none;
      margin-top: 6px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--panel);
      max-height: 220px;
      overflow: auto;
      z-index: 20;
      position: absolute;
      left: 0;
      right: 0;
      top: 100%;
    }

    .suggestion-item {
      padding: 10px 12px;
      cursor: pointer;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      gap: 10px;
    }

    .suggestion-item:last-child {
      border-bottom: 0;
    }

    .suggestion-item:hover,
    .suggestion-item.active {
      background: #1f2937;
    }

    .footer-status {
      margin-top: 14px;
      color: var(--muted);
      font-size: 12px;
      text-align: center;
    }

    @media (max-width: 1100px) {
      .tables-row {
        flex-direction: column;
      }
    }

    @media (max-width: 900px) {
      .grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 560px) {
      .grid {
        grid-template-columns: 1fr;
      }

      .wrap {
        padding: 10px;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">

    <div class="card">
      <div class="search-row" style="margin-top:0">
        <div class="search-box" style="flex:2 1 420px;">
          <label>Genel Arama</label>
          <input id="globalSearchInput" placeholder="Sembol, tarih, hedef, fiyat veya not ara" />
        </div>

        <div class="search-box" style="flex:1 1 220px;">
          <label>Filtre</label>
          <select id="globalSearchScope">
            <option value="all" selected>Tümü</option>
            <option value="active">Sadece Hedef Bekleyen</option>
            <option value="history">Sadece Gerçekleşen</option>
          </select>
        </div>

        <button type="button" id="clearGlobalSearchBtn" class="btn-secondary">Aramayı Temizle</button>
      </div>

      <div class="muted small" id="globalSearchInfo" style="margin-top:10px;">
        Tüm kayıtlar gösteriliyor
      </div>
    </div>

    <div class="card">
      <form id="entryForm">
        <div class="grid">
          <div class="field">
            <label>Coin Kodu</label>
            <input id="coin" placeholder="Örn: ETH" required />
          </div>

          <div class="field">
            <label>Binance TR Sembolü</label>
            <input id="symbol" placeholder="Örn: ETHTRY" required autocomplete="off" />
            <div id="symbolSuggestions" class="suggestions"></div>
          </div>

          <div class="field">
            <label>Tarih</label>
            <input id="date" type="date" required />
          </div>

          <div class="field">
            <label>Aşağı Hedef</label>
            <input id="downTarget" type="number" step="any" placeholder="Örn: 4.00" />
          </div>

          <div class="field">
            <label>Yukarı Hedef</label>
            <input id="upTarget" type="number" step="any" placeholder="Örn: 4.50" />
          </div>

          <div class="field">
            <label>Not</label>
            <input id="note" placeholder="İsteğe bağlı" />
          </div>

          <div class="field">
            <label>Otomatik Yenile</label>
            <select id="autoRefreshSeconds">
              <option value="0">Kapalı</option>
              <option value="5">5 sn</option>
              <option value="10" selected>10 sn</option>
              <option value="15">15 sn</option>
              <option value="30">30 sn</option>
            </select>
          </div>
        </div>

        <div class="actions">
          <button type="submit" id="submitBtn" class="btn-primary">Kaydı Ekle</button>
          <button type="button" id="cancelEditBtn" class="btn-secondary" style="display:none">Düzenlemeyi İptal Et</button>
          <button type="button" id="refreshAllBtn" class="btn-success">Tüm Fiyatları Güncelle</button>
          <button type="button" id="notificationBtn" class="btn-warning">Bildirim İzni Ver</button>
          <button type="button" id="telegramTestBtn" class="btn-purple">Telegram Test</button>
          <button type="button" id="exportBtn" class="btn-secondary">JSON Yedek Al</button>
          <button type="button" id="importBtn" class="btn-secondary">JSON Yükle</button>
          <input id="importFile" type="file" accept="application/json" style="display:none" />
          <button type="button" id="clearBtn" class="btn-danger">Tüm Aktif Kayıtları Sil</button>
        </div>
      </form>
    </div>

    <div class="tables-row">
      <div class="card">
        <div class="section-head">
          <h2>Hedef Bekleyen</h2>
          <div class="stats">
            <div class="pill">Toplam: <strong id="totalCount">0</strong></div>
            <div class="pill">Bekliyor: <strong id="waitingCount">0</strong></div>
            <div class="pill">Aşağı Bölge: <strong id="downCount">0</strong></div>
            <div class="pill">Yukarı Bölge: <strong id="upCount">0</strong></div>
          </div>
        </div>

        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Sembol</th>
                <th>Tarih</th>
                <th>Aşağı Hedef</th>
                <th>Yukarı Hedef</th>
                <th>Anlık Fiyat</th>
                <th>Not</th>
              </tr>
            </thead>
            <tbody id="tableBody"></tbody>
          </table>
        </div>
      </div>

      <div class="card">
        <div class="section-head">
          <h2>Gerçekleşen</h2>
          <div class="actions" style="margin-top:0">
            <button type="button" id="clearHistoryBtn" class="btn-danger">Tüm Geçmişi Sil</button>
          </div>
        </div>

        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Sembol</th>
                <th>Aşağı Hedef</th>
                <th>Yukarı Hedef</th>
                <th>Tetiklenen</th>
                <th>Gerçekleşen Fiyat</th>
                <th>Zaman</th>
                <th>Not</th>
              </tr>
            </thead>
            <tbody id="historyTableBody"></tbody>
          </table>
        </div>
      </div>
    </div>

    <div class="footer-status" id="connectionStatus">
      Bağlantı hazırlanıyor...
    </div>
  </div>

  <script>
    const SUPABASE_URL = "https://fudbbptkbobqeiupbbvi.supabase.co";
    const SUPABASE_KEY = "sb_publishable_40wKyJ7lRbbu97G6SYqOog_zD7ZVzUM";
    const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let rows = [];
    let historyRows = [];
    let refreshTimer = null;
    let editingId = null;
    let allSymbols = [];
    let activeSuggestionIndex = -1;
    let currentSuggestionItems = [];

    const entryForm = document.getElementById('entryForm');
    const tableBody = document.getElementById('tableBody');
    const historyTableBody = document.getElementById('historyTableBody');
    const totalCount = document.getElementById('totalCount');
    const waitingCount = document.getElementById('waitingCount');
    const downCount = document.getElementById('downCount');
    const upCount = document.getElementById('upCount');
    const refreshAllBtn = document.getElementById('refreshAllBtn');
    const clearBtn = document.getElementById('clearBtn');
    const clearHistoryBtn = document.getElementById('clearHistoryBtn');
    const exportBtn = document.getElementById('exportBtn');
    const importBtn = document.getElementById('importBtn');
    const importFile = document.getElementById('importFile');
    const autoRefreshSeconds = document.getElementById('autoRefreshSeconds');
    const connectionStatus = document.getElementById('connectionStatus');
    const notificationBtn = document.getElementById('notificationBtn');
    const telegramTestBtn = document.getElementById('telegramTestBtn');
    const submitBtn = document.getElementById('submitBtn');
    const cancelEditBtn = document.getElementById('cancelEditBtn');

    const globalSearchInput = document.getElementById('globalSearchInput');
    const globalSearchScope = document.getElementById('globalSearchScope');
    const clearGlobalSearchBtn = document.getElementById('clearGlobalSearchBtn');
    const globalSearchInfo = document.getElementById('globalSearchInfo');

    const coinInput = document.getElementById('coin');
    const symbolInput = document.getElementById('symbol');
    const dateInput = document.getElementById('date');
    const downTargetInput = document.getElementById('downTarget');
    const upTargetInput = document.getElementById('upTarget');
    const noteInput = document.getElementById('note');
    const symbolSuggestions = document.getElementById('symbolSuggestions');

    dateInput.value = new Date().toISOString().slice(0, 10);
    autoRefreshSeconds.value = localStorage.getItem('hedefTakipRefreshSeconds') || '10';

    function parseNullableNumber(value) {
      const v = String(value).trim();
      if (!v) return null;
      const num = Number(v.replace(',', '.'));
      return Number.isFinite(num) ? num : null;
    }

    function normalizeSymbol(s) {
      return s.replace(/[^a-zA-Z0-9]/g, '').toUpperCase();
    }

    function getSavedRefreshSeconds() {
      return localStorage.getItem('hedefTakipRefreshSeconds') || '10';
    }

    function getGlobalSearchTerm() {
      return (globalSearchInput.value || '').trim().toLocaleLowerCase('tr-TR');
    }

    function getGlobalSearchScope() {
      return globalSearchScope.value || 'all';
    }

    function formatPrice(value) {
      if (value == null || value === '') return '-';
      const n = Number(value);
      if (!Number.isFinite(n)) return '-';
      return new Intl.NumberFormat('tr-TR', {
        minimumFractionDigits: n < 1 ? 4 : 2,
        maximumFractionDigits: n < 1 ? 8 : 6
      }).format(n);
    }

    function formatDateTime(value) {
      if (!value) return '-';
      const d = new Date(value);
      return isNaN(d) ? '-' : d.toLocaleString('tr-TR');
    }

    function escapeHtml(value) {
      return String(value)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    function updateGlobalSearchInfo() {
      const term = globalSearchInput.value.trim();
      const scope = getGlobalSearchScope();

      if (!term) {
        if (scope === 'all') globalSearchInfo.textContent = 'Tüm kayıtlar gösteriliyor';
        if (scope === 'active') globalSearchInfo.textContent = 'Sadece hedef bekleyen gösteriliyor';
        if (scope === 'history') globalSearchInfo.textContent = 'Sadece gerçekleşen gösteriliyor';
        return;
      }

      const scopeText =
        scope === 'all' ? 'tüm kayıtlarda' :
        scope === 'active' ? 'hedef bekleyenlerde' :
        'gerçekleşenlerde';

      globalSearchInfo.textContent = `"${term}" için ${scopeText} filtreleniyor`;
    }

    async function requestNotificationPermission() {
      if (!("Notification" in window)) {
        alert("Bu tarayıcı bildirim desteklemiyor.");
        return;
      }
      const result = await Notification.requestPermission();
      if (result === "granted") {
        alert("Bildirim izni verildi.");
      } else {
        alert("Bildirim izni verilmedi.");
      }
    }

    function notify(title, body) {
      if (!("Notification" in window)) return;
      if (Notification.permission !== "granted") return;
      new Notification(title, { body });
    }

    async function sendTelegram(message) {
      const url = `${SUPABASE_URL}/functions/v1/telegram-send`;
      const res = await fetch(url, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ message })
      });

      const text = await res.text();
      if (!res.ok) throw new Error(`Telegram hata: ${res.status} - ${text}`);
      return text;
    }

    async function fetchPrice(symbol) {
      const url = `${SUPABASE_URL}/functions/v1/price?symbol=${encodeURIComponent(symbol)}`;
      const res = await fetch(url, { method: 'GET', cache: 'no-store' });

      if (!res.ok) {
        const text = await res.text();
        throw new Error(`HTTP ${res.status} - ${text}`);
      }

      const data = await res.json();
      const price = Number(data.price);
      if (!Number.isFinite(price)) throw new Error('Geçersiz fiyat');
      return price;
    }

    async function validateSymbol(symbol) {
      try {
        await fetchPrice(symbol);
        return true;
      } catch {
        return false;
      }
    }

    async function loadSymbols() {
      const url = `${SUPABASE_URL}/functions/v1/symbols`;
      const res = await fetch(url, { method: 'GET', cache: 'no-store' });

      if (!res.ok) {
        const text = await res.text();
        throw new Error(`Sembol listesi alınamadı: ${res.status} - ${text}`);
      }

      const data = await res.json();
      allSymbols = Array.isArray(data.symbols) ? data.symbols : [];
    }

    function getFilteredSymbols(query) {
      const q = query.trim().toUpperCase();
      if (!q) return [];

      return allSymbols
        .filter(item =>
          item.symbol.includes(q) ||
          item.baseAsset.includes(q)
        )
        .slice(0, 12);
    }

    function renderSymbolSuggestions(items) {
      currentSuggestionItems = items;

      if (!items.length) {
        symbolSuggestions.style.display = 'none';
        symbolSuggestions.innerHTML = '';
        activeSuggestionIndex = -1;
        return;
      }

      symbolSuggestions.innerHTML = items.map((item, index) => `
        <div class="suggestion-item" data-symbol="${item.symbol}" data-index="${index}">
          <strong>${item.symbol}</strong>
          <span style="color:#94a3b8; font-size:12px;">${item.baseAsset}/${item.quoteAsset}</span>
        </div>
      `).join('');

      symbolSuggestions.style.display = 'block';
      activeSuggestionIndex = -1;
    }

    function highlightSuggestion() {
      const nodes = symbolSuggestions.querySelectorAll('.suggestion-item');
      nodes.forEach((node, index) => {
        node.classList.toggle('active', index === activeSuggestionIndex);
      });
    }

    function selectSymbol(symbol) {
      symbolInput.value = symbol;
      symbolSuggestions.style.display = 'none';
      symbolSuggestions.innerHTML = '';
      activeSuggestionIndex = -1;
      currentSuggestionItems = [];
    }

    function getZone(row, price) {
      const hasDown = row.downTarget != null && Number.isFinite(Number(row.downTarget));
      const hasUp = row.upTarget != null && Number.isFinite(Number(row.upTarget));

      if (hasDown && price <= Number(row.downTarget)) return 'down';
      if (hasUp && price >= Number(row.upTarget)) return 'up';
      return 'waiting';
    }

    async function loadRowsFromSupabase() {
      const { data, error } = await sb
        .from('targets')
        .select('*')
        .order('created_at', { ascending: false });

      if (error) throw error;

      rows = (data || []).map(item => ({
        id: item.id,
        coin: item.coin || '',
        symbol: item.symbol || '',
        date: item.date || '',
        downTarget: item.lower_target,
        upTarget: item.upper_target,
        note: item.note || '',
        price: item.last_price ?? null,
        currentZone: item.current_zone || 'waiting',
        updatedAt: item.last_checked_at || '',
        error: ''
      }));
    }

    async function loadHistoryFromSupabase() {
      const { data, error } = await sb
        .from('target_history')
        .select('*')
        .order('created_at', { ascending: false });

      if (error) throw error;
      historyRows = data || [];
    }

    async function addRowToSupabase(row) {
      const payload = {
        coin: row.coin,
        symbol: row.symbol,
        date: row.date,
        lower_target: row.downTarget,
        upper_target: row.upTarget,
        note: row.note,
        current_zone: 'waiting'
      };

      const { error } = await sb.from('targets').insert([payload]);
      if (error) throw error;
    }

    async function updateTargetState(id, payload) {
      const { error } = await sb.from('targets').update(payload).eq('id', id);
      if (error) throw error;
    }

    async function updateTargetBasicInfo(id, payload) {
      const { error } = await sb.from('targets').update(payload).eq('id', id);
      if (error) throw error;
    }

    async function insertHistory(payload) {
      const { error } = await sb.from('target_history').insert([payload]);
      if (error) throw error;
    }

    async function deleteRowFromSupabase(id) {
      const { error } = await sb.from('targets').delete().eq('id', id);
      if (error) throw error;
    }

    async function deleteHistoryRow(id) {
      const { error } = await sb.from('target_history').delete().eq('id', id);
      if (error) throw error;
    }

    async function clearAllRowsFromSupabase() {
      const { error } = await sb.from('targets').delete().neq('id', '');
      if (error) throw error;
    }

    async function clearAllHistoryFromSupabase() {
      const { error } = await sb.from('target_history').delete().neq('id', '');
      if (error) throw error;
    }

    function startEditing(row) {
      editingId = row.id;
      coinInput.value = row.coin || '';
      symbolInput.value = row.symbol || '';
      dateInput.value = row.date || new Date().toISOString().slice(0, 10);
      downTargetInput.value = row.downTarget ?? '';
      upTargetInput.value = row.upTarget ?? '';
      noteInput.value = row.note || '';

      submitBtn.textContent = 'Kaydı Güncelle';
      cancelEditBtn.style.display = 'inline-block';
      entryForm.classList.add('editing');
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function cancelEditing() {
      editingId = null;
      entryForm.reset();
      dateInput.value = new Date().toISOString().slice(0, 10);
      autoRefreshSeconds.value = getSavedRefreshSeconds();
      submitBtn.textContent = 'Kaydı Ekle';
      cancelEditBtn.style.display = 'none';
      entryForm.classList.remove('editing');
      symbolSuggestions.style.display = 'none';
      symbolSuggestions.innerHTML = '';
    }

    function matchesSearch(row, term) {
      if (!term) return true;
      const haystack = [
        row.coin,
        row.symbol,
        row.date,
        row.note,
        row.downTarget,
        row.upTarget,
        row.price
      ].filter(v => v != null).join(' ').toLocaleLowerCase('tr-TR');

      return haystack.includes(term);
    }

    function matchesHistorySearch(row, term) {
      if (!term) return true;
      const haystack = [
        row.symbol,
        row.trigger_type,
        row.lower_target,
        row.upper_target,
        row.target_value,
        row.price_at_trigger,
        row.note,
        row.created_at
      ].filter(v => v != null).join(' ').toLocaleLowerCase('tr-TR');

      return haystack.includes(term);
    }

    function renderHistory() {
      historyTableBody.innerHTML = '';

      const scope = getGlobalSearchScope();
      const term = getGlobalSearchTerm();
      const shouldFilter = scope === 'all' || scope === 'history';

      const filteredRows = shouldFilter
        ? historyRows.filter(row => matchesHistorySearch(row, term))
        : historyRows;

      for (const row of filteredRows) {
        const isDown = row.trigger_type === 'down';
        const badgeText = isDown ? 'Aşağı Hedef' : 'Yukarı Hedef';
        const badgeClass = isDown ? 'badge-red' : 'badge-green';

        const lowerTargetHtml = row.lower_target == null
          ? '-'
          : `<span class="target-pill target-pill-down">${formatPrice(row.lower_target)}</span>`;

        const upperTargetHtml = row.upper_target == null
          ? '-'
          : `<span class="target-pill target-pill-up">${formatPrice(row.upper_target)}</span>`;

        const trMain = document.createElement('tr');
        trMain.innerHTML = `
          <td><strong>${escapeHtml(row.symbol || '')}</strong></td>
          <td>${lowerTargetHtml}</td>
          <td>${upperTargetHtml}</td>
          <td><span class="badge ${badgeClass}">${badgeText}</span></td>
          <td>${formatPrice(row.price_at_trigger)}</td>
          <td>${formatDateTime(row.created_at)}</td>
          <td>${escapeHtml(row.note || '-')}</td>
        `;

        const trActions = document.createElement('tr');
        trActions.className = 'action-row';
        trActions.innerHTML = `
          <td colspan="7" class="action-cell">
            <div class="action-bar">
              <button class="btn-danger" data-history-action="delete" data-id="${row.id}">Sil</button>
            </div>
          </td>
        `;

        historyTableBody.appendChild(trMain);
        historyTableBody.appendChild(trActions);
      }

      if (!filteredRows.length) {
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td colspan="7" class="muted" style="text-align:center; padding:18px 10px;">
            Aramana uygun gerçekleşen kayıt bulunamadı.
          </td>
        `;
        historyTableBody.appendChild(tr);
      }
    }

    function renderActive() {
      tableBody.innerHTML = '';

      let waiting = 0;
      let down = 0;
      let up = 0;

      const scope = getGlobalSearchScope();
      const term = getGlobalSearchTerm();
      const shouldFilter = scope === 'all' || scope === 'active';

      const filteredRows = shouldFilter
        ? rows.filter(row => matchesSearch(row, term))
        : rows;

      for (const row of rows) {
        if (row.currentZone === 'down') down++;
        else if (row.currentZone === 'up') up++;
        else waiting++;
      }

      for (const row of filteredRows) {
        const trMain = document.createElement('tr');
        trMain.innerHTML = `
          <td><strong>${escapeHtml(row.symbol || '')}</strong></td>
          <td>${escapeHtml(row.date || '')}</td>
          <td>${row.downTarget == null ? '-' : formatPrice(row.downTarget)}</td>
          <td>${row.upTarget == null ? '-' : formatPrice(row.upTarget)}</td>
          <td><strong>${formatPrice(row.price)}</strong></td>
          <td>${escapeHtml(row.note || '-')}</td>
        `;

        const trActions = document.createElement('tr');
        trActions.className = 'action-row';
        trActions.innerHTML = `
          <td colspan="6" class="action-cell">
            <div class="action-bar">
              <button class="btn-warning" data-action="edit" data-id="${row.id}">Düzenle</button>
              <button class="btn-success" data-action="refresh" data-id="${row.id}">Yenile</button>
              <button class="btn-danger" data-action="delete" data-id="${row.id}">Sil</button>
            </div>
          </td>
        `;

        tableBody.appendChild(trMain);
        tableBody.appendChild(trActions);
      }

      totalCount.textContent = String(rows.length);
      waitingCount.textContent = String(waiting);
      downCount.textContent = String(down);
      upCount.textContent = String(up);

      if (!filteredRows.length) {
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td colspan="6" class="muted" style="text-align:center; padding:18px 10px;">
            Aramana uygun hedef bekleyen kayıt bulunamadı.
          </td>
        `;
        tableBody.appendChild(tr);
      }
    }

    function renderAll() {
      updateGlobalSearchInfo();
      renderActive();
      renderHistory();
    }

    async function processRow(row) {
      try {
        row.error = '';
        const price = await fetchPrice(row.symbol);
        const newZone = getZone(row, price);
        const oldZone = row.currentZone || 'waiting';
        const checkedAt = new Date().toISOString();

        row.price = price;
        row.updatedAt = checkedAt;

        if (newZone !== oldZone && newZone !== 'waiting') {
          const targetValue = newZone === 'up' ? row.upTarget : row.downTarget;

          await insertHistory({
            target_id: row.id,
            coin: row.coin,
            symbol: row.symbol,
            trigger_type: newZone,
            target_value: targetValue,
            lower_target: row.downTarget,
            upper_target: row.upTarget,
            price_at_trigger: price,
            note: row.note
          });

          notify(
            `${row.coin} hedefe ulaştı`,
            `${newZone === 'up' ? 'Yukarı hedef' : 'Aşağı hedef'} | Fiyat: ${formatPrice(price)}`
          );

          try {
            await sendTelegram(
              `${row.coin} hedefe ulaştı\nTür: ${newZone === 'up' ? 'Yukarı' : 'Aşağı'}\nSembol: ${row.symbol}\nAşağı Hedef: ${row.downTarget ?? '-'}\nYukarı Hedef: ${row.upTarget ?? '-'}\nGerçekleşen Fiyat: ${price}`
            );
          } catch (telegramErr) {
            console.error('Telegram gönderilemedi:', telegramErr);
          }
        }

        row.currentZone = newZone;

        await updateTargetState(row.id, {
          current_zone: newZone,
          last_price: price,
          last_checked_at: checkedAt
        });
      } catch (err) {
        row.error = err.message || 'Hata';
        row.updatedAt = new Date().toISOString();

        await updateTargetState(row.id, {
          last_checked_at: row.updatedAt
        });
      }
    }

    async function refreshOne(id) {
      const row = rows.find(r => r.id === id);
      if (!row) return;
      await processRow(row);
      await loadHistoryFromSupabase();
      renderAll();
    }

    async function refreshAll() {
      if (!rows.length) return;

      for (const row of rows) {
        await processRow(row);
      }

      await loadHistoryFromSupabase();
      renderAll();
    }

    function setupAutoRefresh() {
      const seconds = Number(getSavedRefreshSeconds());
      autoRefreshSeconds.value = String(seconds);

      if (refreshTimer) {
        clearInterval(refreshTimer);
        refreshTimer = null;
      }

      if (seconds > 0) {
        refreshTimer = setInterval(refreshAll, seconds * 1000);
      }
    }

    entryForm.addEventListener('submit', async (e) => {
      e.preventDefault();

      const coin = coinInput.value.trim().toUpperCase();
      const symbol = normalizeSymbol(symbolInput.value.trim());
      const date = dateInput.value;
      const downTarget = parseNullableNumber(downTargetInput.value);
      const upTarget = parseNullableNumber(upTargetInput.value);
      const note = noteInput.value.trim();

      if (!coin || !symbol || !date) {
        alert('Coin, sembol ve tarih gerekli.');
        return;
      }

      if (downTarget == null && upTarget == null) {
        alert('En az bir hedef girmen gerekiyor.');
        return;
      }

      submitBtn.disabled = true;
      submitBtn.textContent = 'Kontrol ediliyor...';

      try {
        const isValidSymbol = await validateSymbol(symbol);
        if (!isValidSymbol) {
          alert('Geçersiz sembol. Listeden seç veya doğru TRY paritesini gir.');
          return;
        }

        if (editingId) {
          await updateTargetBasicInfo(editingId, {
            coin,
            symbol,
            date,
            lower_target: downTarget,
            upper_target: upTarget,
            note
          });

          cancelEditing();
        } else {
          await addRowToSupabase({
            coin,
            symbol,
            date,
            downTarget,
            upTarget,
            note
          });

          entryForm.reset();
          dateInput.value = new Date().toISOString().slice(0, 10);
          autoRefreshSeconds.value = getSavedRefreshSeconds();
        }

        await loadRowsFromSupabase();
        renderAll();
        await refreshAll();
      } catch (err) {
        console.error(err);
        alert('İşlem başarısız: ' + (err.message || 'Bilinmeyen hata'));
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = editingId ? 'Kaydı Güncelle' : 'Kaydı Ekle';
      }
    });

    cancelEditBtn.addEventListener('click', cancelEditing);
    refreshAllBtn.addEventListener('click', refreshAll);

    clearBtn.addEventListener('click', async () => {
      if (!confirm('Tüm aktif kayıtlar silinsin mi?')) return;

      try {
        await clearAllRowsFromSupabase();
        rows = [];
        renderAll();
      } catch (err) {
        console.error(err);
        alert('Aktif kayıtlar silinemedi: ' + (err.message || 'Bilinmeyen hata'));
      }
    });

    clearHistoryBtn.addEventListener('click', async () => {
      if (!confirm('Tüm geçmişi silinsin mi?')) return;

      try {
        await clearAllHistoryFromSupabase();
        historyRows = [];
        renderAll();
      } catch (err) {
        console.error(err);
        alert('Geçmiş kayıtlar silinemedi: ' + (err.message || 'Bilinmeyen hata'));
      }
    });

    exportBtn.addEventListener('click', () => {
      const exportRows = rows.map(row => ({
        coin: row.coin,
        symbol: row.symbol,
        date: row.date,
        lower_target: row.downTarget,
        upper_target: row.upTarget,
        note: row.note,
        current_zone: row.currentZone
      }));

      const blob = new Blob([JSON.stringify(exportRows, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'hedef-takip-yedek.json';
      a.click();
      URL.revokeObjectURL(url);
    });

    importBtn.addEventListener('click', () => importFile.click());

    importFile.addEventListener('change', async (e) => {
      const file = e.target.files[0];
      if (!file) return;

      try {
        const text = await file.text();
        const data = JSON.parse(text);

        if (!Array.isArray(data)) {
          throw new Error('Geçersiz dosya');
        }

        for (const item of data) {
          const symbol = normalizeSymbol(String(item.symbol || '').trim());
          const ok = await validateSymbol(symbol);
          if (!ok) continue;

          await addRowToSupabase({
            coin: String(item.coin || '').trim().toUpperCase(),
            symbol,
            date: item.date || new Date().toISOString().slice(0, 10),
            downTarget: item.lower_target ?? item.downTarget ?? null,
            upTarget: item.upper_target ?? item.upTarget ?? null,
            note: item.note || ''
          });
        }

        await loadRowsFromSupabase();
        renderAll();
        await refreshAll();
      } catch (err) {
        console.error(err);
        alert('JSON yüklenemedi: ' + err.message);
      } finally {
        importFile.value = '';
      }
    });

    autoRefreshSeconds.addEventListener('change', () => {
      localStorage.setItem('hedefTakipRefreshSeconds', autoRefreshSeconds.value);
      setupAutoRefresh();
    });

    globalSearchInput.addEventListener('input', renderAll);
    globalSearchScope.addEventListener('change', renderAll);

    clearGlobalSearchBtn.addEventListener('click', () => {
      globalSearchInput.value = '';
      globalSearchScope.value = 'all';
      renderAll();
      globalSearchInput.focus();
    });

    notificationBtn.addEventListener('click', requestNotificationPermission);

    telegramTestBtn.addEventListener('click', async () => {
      try {
        await sendTelegram('TEST MESAJI 🚀 Hedef Takip çalışıyor.');
        alert('Telegram test mesajı gönderildi.');
      } catch (err) {
        console.error(err);
        alert('Telegram gönderilemedi: ' + (err.message || 'Bilinmeyen hata'));
      }
    });

    symbolInput.addEventListener('input', () => {
      const items = getFilteredSymbols(symbolInput.value);
      renderSymbolSuggestions(items);
    });

    symbolInput.addEventListener('keydown', (e) => {
      if (!currentSuggestionItems.length) return;

      if (e.key === 'ArrowDown') {
        e.preventDefault();
        activeSuggestionIndex = Math.min(activeSuggestionIndex + 1, currentSuggestionItems.length - 1);
        highlightSuggestion();
      }

      if (e.key === 'ArrowUp') {
        e.preventDefault();
        activeSuggestionIndex = Math.max(activeSuggestionIndex - 1, 0);
        highlightSuggestion();
      }

      if (e.key === 'Enter' && activeSuggestionIndex >= 0) {
        e.preventDefault();
        selectSymbol(currentSuggestionItems[activeSuggestionIndex].symbol);
      }

      if (e.key === 'Escape') {
        symbolSuggestions.style.display = 'none';
        activeSuggestionIndex = -1;
      }
    });

    symbolSuggestions.addEventListener('click', (e) => {
      const item = e.target.closest('[data-symbol]');
      if (!item) return;
      selectSymbol(item.dataset.symbol);
    });

    document.addEventListener('click', (e) => {
      if (!symbolSuggestions.contains(e.target) && e.target !== symbolInput) {
        symbolSuggestions.style.display = 'none';
      }
    });

    coinInput.addEventListener('blur', () => {
      const coin = coinInput.value.trim().toUpperCase();
      if (!coin || symbolInput.value.trim()) return;

      const found = allSymbols.find(item => item.baseAsset === coin);
      if (found) {
        symbolInput.value = found.symbol;
      }
    });

    tableBody.addEventListener('click', async (e) => {
      const btn = e.target.closest('button');
      if (!btn) return;

      const id = btn.dataset.id;
      const action = btn.dataset.action;

      try {
        if (action === 'delete') {
          await deleteRowFromSupabase(id);
          if (editingId === id) cancelEditing();
          await loadRowsFromSupabase();
          renderAll();
        }

        if (action === 'refresh') {
          await refreshOne(id);
        }

        if (action === 'edit') {
          const row = rows.find(r => r.id === id);
          if (row) startEditing(row);
        }
      } catch (err) {
        console.error(err);
        alert('İşlem başarısız: ' + (err.message || 'Bilinmeyen hata'));
      }
    });

    historyTableBody.addEventListener('click', async (e) => {
      const btn = e.target.closest('button');
      if (!btn) return;

      const id = btn.dataset.id;
      const action = btn.dataset.historyAction;

      try {
        if (action === 'delete') {
          await deleteHistoryRow(id);
          await loadHistoryFromSupabase();
          renderAll();
        }
      } catch (err) {
        console.error(err);
        alert('Gerçekleşen kayıt silinemedi: ' + (err.message || 'Bilinmeyen hata'));
      }
    });

    async function init() {
      try {
        connectionStatus.textContent = 'Bağlantı kontrol ediliyor...';

        const { error } = await sb.from('targets').select('id').limit(1);
        if (error) throw error;

        connectionStatus.textContent = 'Bağlantı başarılı. Veriler ve semboller yükleniyor.';
        await loadSymbols();
        await loadRowsFromSupabase();
        await loadHistoryFromSupabase();
        renderAll();
        setupAutoRefresh();

        if (rows.length) {
          await refreshAll();
        }
      } catch (err) {
        console.error(err);
        connectionStatus.textContent = 'Bağlantı hatası: ' + (err.message || 'Bilinmeyen hata');
      }
    }

    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("service-worker.js").catch(console.error);
    }

    init();
  </script>
</body>
</html>
